<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giải Phóng Miền Nam – 30/4/1975</title>
<link href="https://fonts.googleapis.com/css2?family=Rokkitt:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;font-family:'Rokkitt',serif;overflow:hidden;position:fixed;inset:0}
#gameWrapper{
  position:fixed;
  top:50%; left:50%;
  width:800px;height:500px;
  box-shadow:0 0 60px rgba(218,37,29,.5);
  transform-origin:center center;
  transform:translate(-50%,-50%);
}
canvas{display:block;width:800px;height:500px;image-rendering:pixelated}
/* Các overlay HTML scale theo wrapper */
#stageIntro,#questionOverlay,#resultFeedback,#gameOverScreen,#finalInventory,#loadingScreen{
  font-size:clamp(10px,1.8vw,16px);
}

/* LOADING */
#loadingScreen{position:absolute;inset:0;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:18px}
#loadingScreen h1{font-size:20px;color:#f4d03f;text-shadow:0 0 12px #DA251D;text-align:center;line-height:1.6}
.lbar-outer{width:280px;height:16px;border:2px solid #f4d03f;border-radius:2px;overflow:hidden}
.lbar-inner{height:100%;background:linear-gradient(90deg,#DA251D,#ff6b35);width:0%;transition:width .2s}
#loadingScreen p{font-size:13px;color:#666}

/* ITEM IMAGE IN POPUP */
#resultItemImg{margin:12px auto 6px;display:none;text-align:center}
#resultItemImgEl{width:160px;height:160px;object-fit:contain;border:2px solid #f4d03f;border-radius:8px;background:rgba(0,0,0,.4);padding:6px}

/* STAGE INTRO */
#stageIntro{position:absolute;inset:0;display:none;align-items:center;justify-content:center;z-index:80;background:rgba(0,0,0,.68)}
#stageIntroBox{text-align:center;padding:28px 44px;border:3px solid #f4d03f;background:rgba(5,5,15,.92);border-radius:4px;animation:popIn .4s ease}
#stageIntroBox .stage-num{font-size:14px;color:#888;letter-spacing:3px;margin-bottom:8px}
#stageIntroBox .stage-name{font-size:24px;font-weight:700;margin-bottom:12px}
#stageIntroBox .stage-sub{font-size:14px;color:#aaa}
@keyframes popIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}

/* QUESTION POPUP */
#questionOverlay{position:absolute;inset:0;display:none;align-items:flex-end;justify-content:center;z-index:70;padding-bottom:0}
#questionBox{width:100%;background:rgba(4,8,20,.96);border-top:3px solid #f4d03f;padding:14px 22px 18px}
#qStageLabel{font-size:11px;color:#888;letter-spacing:2px;margin-bottom:5px;text-transform:uppercase}
#qText{font-size:16px;color:#fff;font-weight:600;line-height:1.5;margin-bottom:12px}
#qChoices{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.qbtn{background:rgba(255,255,255,.06);border:2px solid #444;color:#ddd;font-family:'Rokkitt',serif;font-size:14px;padding:9px 12px;cursor:pointer;text-align:left;border-radius:3px;transition:all .15s;line-height:1.4}
.qbtn:hover{background:rgba(244,208,63,.15);border-color:#f4d03f;color:#fff}
.qbtn.correct{background:rgba(39,174,96,.25);border-color:#27ae60;color:#2ecc71;pointer-events:none}
.qbtn.wrong{background:rgba(231,76,60,.25);border-color:#e74c3c;color:#e74c3c;pointer-events:none}
.qbtn.reveal{background:rgba(39,174,96,.12);border-color:#27ae60;color:#2ecc71;pointer-events:none}

/* RESULT FEEDBACK */
#resultFeedback{position:absolute;inset:0;display:none;align-items:center;justify-content:center;z-index:75;pointer-events:none}
#resultBox{text-align:center;padding:18px 36px 22px;border-radius:4px;border:3px solid;animation:popIn .3s ease;max-width:340px}
#resultBox.correct-box{background:rgba(10,40,10,.95);border-color:#27ae60}
#resultBox.wrong-box{background:rgba(40,5,5,.95);border-color:#e74c3c}
#resultIcon{font-size:42px;display:block;margin-bottom:6px}
#resultTitle{font-size:22px;font-weight:700;margin-bottom:5px}
#resultDetail{font-size:14px;color:#aaa;line-height:1.6}
#resultItemName{font-size:16px;color:#f4d03f;margin-top:7px;font-weight:600}
#resultContinueBtn{margin-top:14px;background:#f4d03f;color:#000;border:none;font-family:'Rokkitt',serif;font-size:15px;font-weight:700;padding:10px 32px;cursor:pointer;border-radius:3px;pointer-events:all}
#resultContinueBtn:hover{background:#fff}

/* FINAL INVENTORY */
#finalInventory{position:absolute;left:80px;right:80px;top:220px;display:none;flex-wrap:wrap;justify-content:center;gap:8px;z-index:85;pointer-events:none}
.finv-item{display:flex;flex-direction:column;align-items:center;gap:3px}
.finv-item img{width:44px;height:44px;object-fit:contain;border:1px solid #f4d03f;border-radius:4px;background:rgba(0,0,0,.5);padding:2px}
.finv-item span{font-size:9px;color:#ccc;text-align:center;max-width:46px;line-height:1.2}

/* GAME OVER */
#gameOverScreen{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:90;background:rgba(30,0,0,.93);gap:16px}
#gameOverScreen h2{font-size:36px;color:#e74c3c;text-shadow:0 0 20px #e74c3c}
#gameOverScreen p{font-size:16px;color:#ccc;text-align:center;line-height:1.8;max-width:480px}
#gameOverScreen .correct-ans{color:#f4d03f;font-weight:600}
#retryBtn{background:#DA251D;color:#fff;border:none;font-family:'Rokkitt',serif;font-size:16px;font-weight:700;padding:12px 40px;cursor:pointer;border-radius:3px;margin-top:8px}
#retryBtn:hover{background:#ff3030}
#retryBtn.lbBtn{background:rgba(244,208,63,.15);border:2px solid #f4d03f;color:#f4d03f;margin-top:6px}
#retryBtn.lbBtn:hover{background:#f4d03f;color:#000}

/* PLAYER INFO SCREEN */
#playerInfoScreen{position:absolute;inset:0;display:none;align-items:center;justify-content:center;z-index:86;background:rgba(0,0,0,.9)}
#playerInfoBox{background:rgba(4,10,30,.97);border:2px solid #f4d03f;border-radius:6px;padding:30px 36px;width:420px;max-width:92%}
#playerInfoBox h2{color:#f4d03f;font-size:19px;text-align:center;margin-bottom:5px;letter-spacing:2px}
#playerInfoBox .pinfoSub{color:#888;font-size:12px;text-align:center;margin-bottom:20px}
.pfield{margin-bottom:13px}
.pfield label{display:block;color:#aaa;font-size:11px;letter-spacing:1px;margin-bottom:4px;text-transform:uppercase}
.pfield input{width:100%;background:rgba(255,255,255,.06);border:1.5px solid #444;color:#fff;font-family:'Rokkitt',serif;font-size:14px;padding:9px 11px;border-radius:3px;outline:none;transition:border-color .15s;box-sizing:border-box}
.pfield input:focus{border-color:#f4d03f}
.pfield input::placeholder{color:#444}
#pinfoError{color:#e74c3c;font-size:12px;text-align:center;min-height:18px;margin-bottom:8px}
#pinfoStartBtn{width:100%;background:#DA251D;color:#fff;border:none;font-family:'Rokkitt',serif;font-size:16px;font-weight:700;padding:12px;cursor:pointer;border-radius:3px;letter-spacing:1px;transition:background .15s}
#pinfoStartBtn:hover{background:#ff3030}
</style>
</head>

<script>
// ═══════════════════════════════════════════════════════
//  AUDIO CONTEXT + PRELOAD TYPING SOUND
// ═══════════════════════════════════════════════════════
(function(){
  try{ window._gameAC = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){}
  const resume = ()=>{
    if(window._gameAC && window._gameAC.state==='suspended') window._gameAC.resume();
  };
  ['pointerdown','touchstart','keydown','mousedown'].forEach(ev=>
    document.addEventListener(ev, resume, {once:true, passive:true})
  );
  // Preload keyboard typing sound
  window._typingBuf = null;
  function loadTyping(){
    const ac = window._gameAC; if(!ac) return;
    fetch('Game sound/Keyboard typing sound effect.mp3')
      .then(r=>r.arrayBuffer())
      .then(buf=>ac.decodeAudioData(buf, decoded=>{ window._typingBuf=decoded; }))
      .catch(()=>{});
  }
  // Load sau 1s để không tranh bandwidth lúc trang khởi động
  setTimeout(loadTyping, 1000);
})();

// ═══════════════════════════════════════════════════════
//  DỮ LIỆU
// ═══════════════════════════════════════════════════════
const STAGES = [
  {id:1, name:'GIAI ĐOẠN 1: CHUẨN BỊ',           color:'#27ae60', emoji:'🟢'},

const QUESTIONS = [

   item:{name:'Loa Phát Thanh',emoji:'📢'}},

// ── Mapping tên vật phẩm → file ảnh ─────────────────────

  'Bản đồ chiến dịch':    'game image/tactical map.png',
  'Bộ đàm liên lạc':      'game image/phone_transparent.png',

  'Xe Tăng':              'game image/tank_transparent.png',
  'Lá cờ Giải Phóng':     'game image/liberation flag_transparent.png',

};

// ── Vị trí thế giới (world coords) cho từng câu hỏi ──────
// Thế giới rộng 2800px, màn hình 800px → cảm giác di chuyển rõ ràng
// Mỗi bước ~190px → ở tốc độ 0.063px/ms sẽ mất ~3 giây
const WORLD_W   = 2800;
const HERO_SCR  = 260;   // vị trí X cố định của nhân vật trên màn hình
const CHECKPOINTS = [200, 390, 580, 770, 950, 1130, 1325, 1510, 1690, 1870, 2045, 2220];
// Sau câu 12: đi tới 2620 (ngay trước cổng Dinh)

// ═══════════════════════════════════════════════════════
//  CANVAS / RENDER HELPERS
// ═══════════════════════════════════════════════════════
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');

const P = {
  rect(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(~~x,~~y,~~w,~~h)},
  text(t,x,y,c='#fff',sz=16,al='left'){ctx.fillStyle=c;ctx.font=`${sz}px 'Rokkitt',serif`;ctx.textAlign=al;ctx.fillText(t,~~x,~~y)},
  grad(x,y,w,h,stops){const g=ctx.createLinearGradient(x,y,x,y+h);stops.forEach(([s,c])=>g.addColorStop(s,c));ctx.fillStyle=g;ctx.fillRect(x,y,w,h)},
};

const CHAR_SPRITES = {
  stand:{sx:317,sy:284,sw:354,sh:665},
  walk: {sx:787,sy:284,sw:299,sh:675},
  flag: {sx:1157,sy:154,sw:405,sh:794},
};

// ── vẽ cây ──────────────────────────────────────────────
function drawTree(wx, gy, height, t, seed){
  const sway = Math.sin(t*.0013 + seed*.85) * 2.5;
  ctx.fillStyle = '#6b3d14';
  ctx.fillRect(wx-4+sway*.1, gy-height*.36, 8, height*.36);
  [[0,1,.27],[.18,.88,.22],[.4,.72,.18]].forEach(([yf,ys,sp],li)=>{
    ctx.fillStyle = ['#1a7010','#157a0a','#196e0c'][li];
    ctx.beginPath();
    ctx.moveTo(wx + sway, gy - height*(1-yf));
    ctx.lineTo(wx - height*sp*ys + sway*.4, gy - height*(.5+yf*.2));
    ctx.lineTo(wx + height*sp*ys + sway*.4, gy - height*(.5+yf*.2));
    ctx.closePath(); ctx.fill();
  });
}

// ── vẽ xe tăng (trong hành trình) ───────────────────────
function drawJourneyTank(sx, sy, t, moving){
  // Khói bụi khi di chuyển
  if(moving){
    for(let d=0;d<5;d++){
      const da = ((t*.0028 + d*.32) % 1);
      ctx.fillStyle = `rgba(170,150,110,${0.38*(1-da)})`;
      ctx.beginPath();
      ctx.arc(sx-54 - da*30, sy+5 - da*6, 2+da*9, 0, Math.PI*2);
      ctx.fill();
    }
  }
  P.rect(sx-54, sy-21, 108, 25, '#556B2F');
  P.rect(sx-22, sy-39, 60, 19, '#4a5e28');
  P.rect(sx+28, sy-36, 52, 8,  '#3d5022');
  P.rect(sx-58, sy+3,  116,15, '#1a1a1a');
  const toff = moving ? (t*.026 % 14) : 0;
  for(let wx=-56; wx<58; wx+=14){
    P.rect(sx+wx+toff, sy+4,  10, 13, '#2d2d2d');
    P.rect(sx+wx+toff, sy+5,  10, 10, '#555');
  }
  [-42,-20,4,26].forEach(wx=>{
    ctx.beginPath(); ctx.arc(sx+wx, sy+11, 7,0,Math.PI*2); ctx.fillStyle='#333'; ctx.fill();
    ctx.beginPath(); ctx.arc(sx+wx, sy+11, 3,0,Math.PI*2); ctx.fillStyle='#888'; ctx.fill();
  });
  P.rect(sx-11, sy-56, 3, 21, '#aaa');
  P.rect(sx- 8, sy-56, 18,12, '#DA251D');
  ctx.fillStyle='#FFFF00'; ctx.font='10px serif'; ctx.textAlign='center';
  ctx.fillText('★', sx+2, sy-47);
  P.rect(sx-24, sy-15, 28,13, 'rgba(0,0,0,.55)');
  P.text('390', sx-10, sy-5, '#fff', 10, 'center');
}

// ═══════════════════════════════════════════════════════
//  ENGINE (G)
// ═══════════════════════════════════════════════════════
const G = {
  scene:null, scenes:{},
  currentQ:0, inventory:[], lastStage:0,
  correctCount:0, gameStartTime:0,
  playerInfo:{name:'',position:'',bu:''},
  mouse:{x:0,y:0}, clickables:[],
  stars:[], lastTime:0,
  imgs:{cover:null,bg1:null,bgEnd:null,char:null,soldiers:null,tank:null,dinhDocLap:null,ironGate:null,op1:null,op2:null,op3:null},
  imgLoaded:0, imgTotal:11,
  itemImgCache:{}, // ảnh vật phẩm preload cho canvas road item
  tr:{active:false,dir:'out',alpha:0,dur:500,timer:0,cb:null},

  // ── HÀNH TRÌNH ──────────────────────────────────────
  // worldX: vị trí nhân vật trong thế giới (pixel)
  // cameraX: camera offset (smooth theo worldX)
  journey:{
    worldX:200, targetWorldX:200,
    cameraX:0,
    walking:false, walkT:0,
    useSoldiers:false, useTank:false, pendingCb:null,
  },

  makeStars(n=80){
    this.stars=[];
    for(let i=0;i<n;i++)
      this.stars.push({x:Math.random()*800,y:Math.random()*350,sz:Math.random()<.7?1:2,tw:Math.random()*Math.PI*2,sp:.5+Math.random()});
  },
  initInput(){
    const toG=e=>{const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*800/r.width,y:(e.clientY-r.top)*500/r.height}};
    canvas.addEventListener('mousemove',e=>{const p=toG(e);this.mouse.x=p.x;this.mouse.y=p.y});
    canvas.addEventListener('click',e=>{const p=toG(e);for(const c of this.clickables){if(p.x>=c.x&&p.x<=c.x+c.w&&p.y>=c.y&&p.y<=c.y+c.h){c.fn();return}}});
  },
  addClick(x,y,w,h,fn){this.clickables.push({x,y,w,h,fn})},
  clearClicks(){this.clickables=[]},
  goto(name){if(!this.scenes[name])return;this.clearClicks();this.scene=this.scenes[name];if(this.scene.enter)this.scene.enter()},
  fadeTo(name,dur=500){this.tr={active:true,dir:'out',alpha:0,dur,timer:0,cb:()=>{this.goto(name);this.fadeIn(dur)}};},
  fadeIn(dur=500){this.tr={active:true,dir:'in',alpha:1,dur,timer:0,cb:null}},

  startWalkTo(wx, cb){
    const j=this.journey;
    j.targetWorldX=wx; j.walking=true; j.pendingCb=cb;
  },

  // ── VẬT PHẨM TRÊN ĐƯỜNG ─────────────────────────────
  // Chỉ lưu vị trí + item để render; không tự trigger callback
  roadItem:{active:false, worldX:0, item:null},

  // ── QUIZ LOGIC ──────────────────────────────────────
  submitPlayerInfo(){
    const name=(document.getElementById('pinfoName').value||'').trim();
    const pos =(document.getElementById('pinfoPos').value||'').trim();
    const bu  =(document.getElementById('pinfoBU').value||'').trim();
    const err = document.getElementById('pinfoError');
    if(!name){err.textContent='⚠ Vui lòng nhập họ và tên!';return;}
    if(!pos) {err.textContent='⚠ Vui lòng nhập vị trí làm việc!';return;}
    err.textContent='';
    this.playerInfo={name,position:pos,bu};
    document.getElementById('playerInfoScreen').style.display='none';
    this.fadeTo('GAME');
  },

  submitRecord(won){
    const elapsed=Math.max(1,Math.floor((Date.now()-this.gameStartTime)/1000));
    const rec={
      name:this.playerInfo.name,
      position:this.playerInfo.position,
      bu:this.playerInfo.bu,
      score:this.correctCount,
      time:elapsed,
      won:won,
      date:new Date().toLocaleDateString('vi-VN')
    };
    fetch('/api/record',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(rec)}).catch(()=>{});
  },

  startGame(){
    this.currentQ=0; this.inventory=[]; this.lastStage=0;
    this.correctCount=0; this.gameStartTime=Date.now();
    const j=this.journey;
    j.worldX=CHECKPOINTS[0]; j.targetWorldX=CHECKPOINTS[0];
    j.cameraX=Math.max(0,CHECKPOINTS[0]-HERO_SCR);
    j.walking=false; j.walkT=0; j.useSoldiers=false; j.useTank=false; j.pendingCb=null;
    // Đặt item Q1 lên đường ngay từ đầu
    const q0=QUESTIONS[0];
    this.roadItem = q0.item ? {active:true, worldX:CHECKPOINTS[0], item:q0.item} : {active:false};
    this.showStageIntro(q0.stage, ()=>{
      this.roadItem.active=false;
      this.showQuestion();
    });
  },

  showStageIntro(stageId,cb){
    const s=STAGES.find(x=>x.id===stageId);
    document.getElementById('stageNum').textContent=`${s.emoji} GIAI ĐOẠN ${s.id} / 5`;
    document.getElementById('stageName').textContent=s.name.replace(/^[🟢🔵🟡🟣🔴]\s*GIAI ĐOẠN \d+:\s*/,'');
    document.getElementById('stageName').style.color=s.color;
    const el=document.getElementById('stageIntro');
    el.style.display='flex';
    document.getElementById('stageIntroBox').style.animation='none';
    setTimeout(()=>{document.getElementById('stageIntroBox').style.animation='popIn .4s ease'},10);
    setTimeout(()=>{el.style.display='none';if(cb)cb()},2400);
  },

  showQuestion(){
    const q=QUESTIONS[this.currentQ];
    const s=STAGES.find(x=>x.id===q.stage);
    if(this.scene&&this.scene.setStageColor) this.scene.setStageColor(s.color);
    document.getElementById('qStageLabel').textContent=`${s.emoji} ${s.name}  •  Câu ${this.currentQ+1} / ${QUESTIONS.length}`;
    document.getElementById('qStageLabel').style.color=s.color;
    document.getElementById('qText').textContent=q.q;
    const grid=document.getElementById('qChoices');
    grid.innerHTML='';
    q.ch.forEach((ch,i)=>{
      const btn=document.createElement('button');
      btn.className='qbtn'; btn.textContent=ch;
      btn.onclick=()=>this.handleAnswer(i);
      grid.appendChild(btn);
    });
    document.getElementById('questionOverlay').style.display='flex';
  },

  handleAnswer(choiceIdx){
    const q=QUESTIONS[this.currentQ];
    const btns=document.querySelectorAll('.qbtn');
    btns.forEach(b=>b.style.pointerEvents='none');
    if(choiceIdx===q.ans){
      this.correctCount++;
      btns[choiceIdx].classList.add('correct');
      document.getElementById('questionOverlay').style.display='none';
      this.showCorrectFeedback(q);
    } else {
      btns[choiceIdx].classList.add('wrong');
      btns[q.ans].classList.add('reveal');
      setTimeout(()=>{
        document.getElementById('questionOverlay').style.display='none';
        this.showGameOver(q);
      },1200);
    }
  },

  showCorrectFeedback(q){
    const fb=document.getElementById('resultFeedback');
    document.getElementById('resultBox').className='correct-box';
    document.getElementById('resultIcon').textContent='✅';
    document.getElementById('resultTitle').textContent='Chính xác!';
    document.getElementById('resultTitle').style.color='#2ecc71';
    const imgDiv=document.getElementById('resultItemImg');
    const imgEl=document.getElementById('resultItemImgEl');
    if(q.item){
      document.getElementById('resultDetail').textContent='Bạn nhận được vật phẩm:';
      document.getElementById('resultItemName').textContent=q.item.name;
      document.getElementById('resultItemName').style.display='block';
      // Hiện ảnh vật phẩm nếu có
      const imgSrc=ITEM_IMAGES[q.item.name];
      if(imgSrc){ imgEl.src=imgSrc; imgDiv.style.display='block'; }
      else { imgDiv.style.display='none'; }
      this.inventory.push(q.item);
    } else {
      document.getElementById('resultDetail').textContent='Kiến thức tốt! Tiếp tục nhé.';
      document.getElementById('resultItemName').style.display='none';
      imgDiv.style.display='none';
    }
    document.getElementById('resultContinueBtn').style.display='block';
    fb.style.display='flex';
  },

  onResultContinue(){
    document.getElementById('resultFeedback').style.display='none';
    document.getElementById('resultItemImg').style.display='none';
    // Sau câu 5 (index 4) → chuyển sang ảnh đoàn quân soldiers
    if(this.currentQ===4){ this.journey.useSoldiers=true; this.journey.useTank=false; }
    // Sau câu 6 (index 5) → chuyển sang xe tăng
    if(this.currentQ===5){ this.journey.useTank=true; this.journey.useSoldiers=false; }
    this.currentQ++;
    if(this.currentQ>=QUESTIONS.length){
      this.startWalkTo(2640,()=>this.endGame());
      return;
    }
    const nextX=CHECKPOINTS[this.currentQ];
    const nq=QUESTIONS[this.currentQ], pq=QUESTIONS[this.currentQ-1];
    // Đặt item câu tiếp theo lên đường NGAY TRƯỚC KHI đi — nhân vật sẽ đi về phía nó
    this.roadItem = nq.item ? {active:true, worldX:nextX, item:nq.item} : {active:false};
    this.startWalkTo(nextX,()=>{
      // Tới nơi → nhặt item (ẩn đi) → hiện câu hỏi
      this.roadItem.active=false;
      if(nq.stage!==pq.stage) this.showStageIntro(nq.stage,()=>this.showQuestion());
      else this.showQuestion();
    });
  },

  showGameOver(q){
    this.submitRecord(false);
    const elapsed=Math.max(1,Math.floor((Date.now()-this.gameStartTime)/1000));
    const mm=String(Math.floor(elapsed/60)).padStart(2,'0'), ss=String(elapsed%60).padStart(2,'0');
    document.getElementById('gameOverMsg').innerHTML=
      `Câu hỏi: <em>${q.q}</em><br><br>Đáp án đúng là: <span class="correct-ans">${q.ch[q.ans]}</span><br><br>`+
      `Đã trả lời đúng: <b style="color:#f4d03f">${this.correctCount}/${QUESTIONS.length} câu</b> &nbsp;•&nbsp; Thời gian: <b style="color:#f4d03f">${mm}:${ss}</b>`;
    document.getElementById('gameOverScreen').style.display='flex';
  },

  restartGame(){
    document.getElementById('gameOverScreen').style.display='none';
    document.getElementById('questionOverlay').style.display='none';
    document.getElementById('resultFeedback').style.display='none';
    document.getElementById('finalInventory').style.display='none';
    this.startGame();
  },

  endGame(){
    document.getElementById('questionOverlay').style.display='none';
    this.submitRecord(true);
    this.fadeTo('FINAL');
  },

  loop(ts){
    const dt=Math.min(ts-this.lastTime,80); this.lastTime=ts;
    if(this.tr.active){
      this.tr.timer+=dt;
      const p=Math.min(this.tr.timer/this.tr.dur,1);
      this.tr.alpha=this.tr.dir==='out'?p:1-p;
      if(p>=1){this.tr.active=false;this.tr.alpha=0;const cb=this.tr.cb;this.tr.cb=null;if(cb)cb()}
    }
    if(this.scene){if(this.scene.update)this.scene.update(dt);ctx.clearRect(0,0,800,500);this.scene.render()}
    if(this.tr.active&&this.tr.alpha>0){ctx.fillStyle=`rgba(0,0,0,${this.tr.alpha})`;ctx.fillRect(0,0,800,500)}
    requestAnimationFrame(t=>this.loop(t));
  },

  init(){
    this.makeStars(); this.initInput();
    const load=(key,src)=>{
      const img=new Image();
      img.onload=()=>{this.imgLoaded++;if(this.imgLoaded>=this.imgTotal)this._onAllLoaded()};
      img.onerror=()=>{this.imgLoaded++;if(this.imgLoaded>=this.imgTotal)this._onAllLoaded()};
      img.src=src; this.imgs[key]=img;
    };
    load('cover','game image/cover image.jpeg');
    load('bg1','game image/background image 1.jpeg');
    load('bgEnd','game image/ending background 1.jpeg');
    load('char','game image/character_transparent.png');
    load('soldiers','game image/soldiers_transparent.png');
    load('tank','game image/tank_transparent.png');
    load('dinhDocLap','game image/dinh doc lap.jpeg');
    load('ironGate','game image/iron gates_transparent.png');
    load('op1','game image/opening 1.jpg');
    load('op2','game image/opening 2.jpg');
    load('op3','game image/after opening styled.png');
    // Preload ảnh vật phẩm cho road item (không tính imgTotal)
    Object.entries(ITEM_IMAGES).forEach(([name,src])=>{
      const img=new Image(); img.src=src;
      this.itemImgCache[name]=img;
    });
  },
  _onAllLoaded(){
    document.getElementById('lbar').style.width='100%';
    setTimeout(()=>{
      document.getElementById('loadingScreen').style.display='none';
      this.goto('INTRO');
      requestAnimationFrame(t=>{this.lastTime=t;this.loop(t)});
    },400);
  },
};

//  SCENE: INTRO – Opening cinematic (2 slides + typewriter)
// ═══════════════════════════════════════════════════════
G.scenes.INTRO = (function(){
  const SLIDES = [
    {
      key:'op1',
      text:'Mùa Xuân năm 1975 – thời khắc lịch sử đã chín muồi. Sau Hiệp định Paris 1973, cục diện chiến tranh thay đổi hoàn toàn: Mỹ rút quân, chính quyền Sài Gòn suy yếu, trong khi lực lượng cách mạng ngày càng lớn mạnh. Nắm bắt thời cơ, Đảng quyết định mở cuộc tổng tiến công chiến lược – với tinh thần thần tốc, táo bạo, bất ngờ, chắc thắng.',
    },
    {
      key:'op2',
      text:'Từ chiến thắng tạo đà tại Chiến thắng Phước Long, quân ta liên tiếp mở ba chiến dịch lớn: Tây Nguyên, Huế – Đà Nẵng, và đỉnh cao là Chiến dịch Hồ Chí Minh – tiến thẳng vào Sài Gòn.',
    },
    {
      key:'op3',
      text:'', // Slide 3: ảnh giới thiệu nhân vật – không cần typewriter
    },
  ];
  const CHAR_MS   = 50;   // ms mỗi ký tự
  const PAUSE_MS  = 2200; // dừng sau khi gõ xong
  const FADE_MS   = 500;  // fade in/out
  const FONT_SZ   = 13;
  const LINE_H    = 20;
  const TEXT_X    = 30;
  const TEXT_W    = 740;
  const TEXT_Y0   = 320;  // bắt đầu vùng text (phía dưới ảnh)

  // Pre-tính dòng cho một đoạn text
  function calcLines(text){
    ctx.font=`${FONT_SZ}px Rokkitt`;
    const words=text.split(' '), lines=[];
    let cur='';
    for(const w of words){
      const test=cur+(cur?' ':'')+w;
      if(ctx.measureText(test).width>TEXT_W && cur){ lines.push(cur); cur=w; }
      else cur=test;
    }
    if(cur) lines.push(cur);
    return lines;
  }

  // Render text đến charIdx ký tự, với stroke viền
  function drawTyped(lines, charIdx){
    ctx.font=`600 ${FONT_SZ}px Rokkitt`;
    ctx.textAlign='left';
    let left=charIdx;
    let y=TEXT_Y0;
    for(const line of lines){
      if(left<=0) break;
      const vis=line.slice(0,left);
      ctx.lineWidth=3.5;
      ctx.strokeStyle='rgba(0,0,0,0.92)';
      ctx.strokeText(vis, TEXT_X, y);
      ctx.fillStyle='#f0e6c8';
      ctx.fillText(vis, TEXT_X, y);
      left-=line.length+1;
      y+=LINE_H;
    }
  }

  // Keyboard typing sound – dùng file MP3 thật
  function _playClick(ac){
    const buf = window._typingBuf;
    if(!buf) return;
    try{
      const src = ac.createBufferSource();
      src.buffer = buf;
      // Mỗi lần gõ chọn offset ngẫu nhiên trong file để âm thanh không đơn điệu
      const maxOffset = Math.max(0, buf.duration - 0.12);
      const offset = Math.random() * maxOffset;
      const gain = ac.createGain();
      gain.gain.value = 0.9;
      src.connect(gain); gain.connect(ac.destination);
      src.start(0, offset, 0.11); // phát 110ms mỗi lần
    }catch(e){}
  }
  function typeClick(){
    const ac = window._gameAC;
    if(!ac) return;
    if(ac.state==='running'){ _playClick(ac); }
    else if(ac.state==='suspended'){ ac.resume().then(()=>_playClick(ac)).catch(()=>{}); }
  }

  return {
    slideIdx:0, charIdx:0, charTimer:0, phase:0, alpha:0, pauseT:0,
    _lines:[], _totalChars:0, _transitioning:false,

    _initSlide(){
      this.charIdx=0; this.charTimer=0; this.phase=0;
      this.alpha=0; this.pauseT=0;
      this._lines = calcLines(SLIDES[this.slideIdx].text);
      this._totalChars = SLIDES[this.slideIdx].text.length;
    },

    enter(){
      G.clearClicks();
      this.slideIdx=0;
      this._transitioning=false;
      this._audioUnlocked=false;
      this._initSlide();
      if(window._startMusic) window._startMusic();
      // Click chỉ để bật audio, không skip
      G.addClick(0,0,800,500,()=>{
        this._audioUnlocked=true;
        if(window._gameAC && window._gameAC.state==='suspended') window._gameAC.resume();
      });
    },

    update(dt){
      if(this._transitioning) return;
      if(this.phase===0){
        // Auto fade-in ảnh
        this.alpha=Math.min(1, this.alpha+dt/FADE_MS);
        if(this.alpha>=1){ this.phase=1; }
      } else if(this.phase===1){
        const slide = SLIDES[this.slideIdx];
        if(!slide.text){
          // Slide không có text (slide 3): hiện ảnh rồi pause luôn
          this.phase=2; this.pauseT=0;
        } else {
          this.charTimer+=dt;
          const prev=this.charIdx;
          this.charIdx=Math.min(this._totalChars, Math.floor(this.charTimer/CHAR_MS));
          if(this.charIdx>prev && this.charIdx<this._totalChars) typeClick();
          if(this.charIdx>=this._totalChars){ this.phase=2; this.pauseT=0; }
        }
      } else if(this.phase===2){
        const pauseDur = SLIDES[this.slideIdx].text ? PAUSE_MS : 3500; // slide ảnh dừng 3.5s
        this.pauseT+=dt;
        if(this.pauseT>=pauseDur){ this.phase=3; }
      } else if(this.phase===3){
        this.alpha=Math.max(0, this.alpha-dt/FADE_MS);
        if(this.alpha<=0){
          this.slideIdx++;
          if(this.slideIdx>=SLIDES.length){
            this._transitioning=true;
            G.fadeTo('MENU'); return;
          }
          this._initSlide();
        }
      }
    },

    render(){
      ctx.fillStyle='#000'; ctx.fillRect(0,0,800,500);
      // Guard: khi đang transition thì không render slide nữa
      if(this._transitioning || this.slideIdx>=SLIDES.length) return;
      const img=G.imgs[SLIDES[this.slideIdx].key];
      if(img && img.complete){
        ctx.globalAlpha=this.alpha;
        try{ ctx.drawImage(img,0,0,800,500); }catch(e){}
        ctx.globalAlpha=1;
      }

      if(this.phase>=1){
        // Overlay gradient phía dưới cho chữ dễ đọc hơn
        const grd=ctx.createLinearGradient(0,TEXT_Y0-40,0,500);
        grd.addColorStop(0,'rgba(0,0,0,0)');
        grd.addColorStop(0.3,'rgba(0,0,0,0.75)');
        grd.addColorStop(1,'rgba(0,0,0,0.92)');
        const gA=Math.min(1,this.charTimer/250);
        if(gA>0){ ctx.globalAlpha=gA; ctx.fillStyle=grd; ctx.fillRect(0,TEXT_Y0-40,800,500-(TEXT_Y0-40)); ctx.globalAlpha=1; }
        drawTyped(this._lines, this.charIdx);
      }

      // Chỉ số slide
      P.text(`${this.slideIdx+1} / ${SLIDES.length}`,780,18,'#555',11,'right');

      // Icon bật âm thanh – ẩn sau khi đã click
      if(!this._audioUnlocked){
        const pulse = 0.6 + 0.35*Math.sin(Date.now()/400);
        ctx.globalAlpha = pulse;
        ctx.fillStyle='rgba(0,0,0,0.5)';
        ctx.beginPath(); ctx.roundRect(8,8,148,30,6); ctx.fill();
        P.text('🔊 Nhấn để bật âm thanh', 82, 28, '#fff', 11, 'center');
        ctx.globalAlpha=1;
      }
    },
  };
})();

// ═══════════════════════════════════════════════════════
//  SCENE: MENU
// ═══════════════════════════════════════════════════════
G.scenes.MENU = {
  t:0,
  enter(){this.t=0;G.clearClicks();
    G.addClick(270,330,260,58,()=>{
      document.getElementById('pinfoName').value='';
      document.getElementById('pinfoPos').value='';
      document.getElementById('pinfoBU').value='';
      document.getElementById('pinfoError').textContent='';
      document.getElementById('playerInfoScreen').style.display='flex';
      setTimeout(()=>document.getElementById('pinfoName').focus(),100);
    });
    G.addClick(320,405,160,30,()=>G.fadeTo('CREDITS'));
    G.addClick(290,445,220,30,()=>G.fadeTo('LEADERBOARD'));
  },
  update(dt){this.t+=dt;for(const s of G.stars)s.tw+=dt*.003*s.sp},
  render(){
    if(G.imgs.cover&&G.imgs.cover.complete&&G.imgs.cover.naturalWidth){
      ctx.drawImage(G.imgs.cover,0,0,800,500);
    } else {
      P.grad(0,0,800,500,[[0,'#0a0520'],[.5,'#1a0a40'],[1,'#8B2500']]);
    }
    ctx.fillStyle='rgba(0,0,0,.45)';ctx.fillRect(0,0,800,500);
    for(const s of G.stars){const a=.4+.4*Math.sin(s.tw);ctx.fillStyle=`rgba(255,255,200,${a})`;ctx.fillRect(s.x,s.y,s.sz,s.sz)}
    ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillRect(120,120,560,200);
    ctx.strokeStyle='#DA251D';ctx.lineWidth=3;ctx.strokeRect(120,120,560,200);
    [[120,120],[680,120],[120,320],[680,320]].forEach(([x,y])=>{ctx.fillStyle='#f4d03f';ctx.fillRect(x-4,y-4,8,8)});
    ctx.shadowColor='#DA251D';ctx.shadowBlur=20;
    P.text('GIẢI PHÓNG MIỀN NAM',400,178,'#DA251D',28,'center');
    ctx.shadowBlur=0;
    P.text('30 / 4 / 1975',400,215,'#f4d03f',20,'center');
    P.text('Game Kỉ Niệm – TNT Group',400,248,'#aaa',13,'center');
    const bh=G.mouse.x>=270&&G.mouse.x<=530&&G.mouse.y>=330&&G.mouse.y<=388;
    ctx.fillStyle=bh?'#DA251D':'rgba(218,37,29,.15)';ctx.fillRect(270,330,260,58);
    ctx.strokeStyle=bh?'#fff':'#DA251D';ctx.lineWidth=2;ctx.strokeRect(270,330,260,58);
    P.text('▶  BẮT ĐẦU NHIỆM VỤ',400,367,bh?'#fff':'#f4d03f',16,'center');

// ═══════════════════════════════════════════════════════
//  SCENE: GAME – Scrolling World
// ═══════════════════════════════════════════════════════
G.scenes.GAME = {
  t:0, stageColor:'#27ae60',

  enter(){
    this.t=0; G.clearClicks();
    setTimeout(()=>G.startGame(),200);
  },
  setStageColor(c){this.stageColor=c},

  update(dt){
    this.t+=dt;
    const j=G.journey;

    // ── Di chuyển nhân vật ──────────────────────────
    if(j.walking){
      j.walkT += dt * .008;
      // Tốc độ: ~0.063px/ms → 190px ≈ 3 giây; tank nhanh hơn chút
      const spd = dt * (j.useTank ? 0.082 : 0.063);
      j.worldX = Math.min(j.worldX + spd, j.targetWorldX);
      if(j.worldX >= j.targetWorldX){
        j.walking = false;
        if(j.pendingCb){ const cb=j.pendingCb; j.pendingCb=null; cb(); }
      }
    }

    // ── Camera smooth follow ────────────────────────
    const targetCam = Math.max(0, Math.min(j.worldX - HERO_SCR, WORLD_W - 800));
    j.cameraX += (targetCam - j.cameraX) * Math.min(1, dt * 0.014);

  },

  render(){
    const j=G.journey, t=this.t;
    const cam=j.cameraX;

    // ── WORLD LAYER – bg1 tile + road + Dinh ─────────
    ctx.save();
    ctx.translate(-cam, 0);

    // ① Background chia 2 vùng theo hành trình
    // Vùng 1 (0 → 1650): bg1 – rừng, đoàn quân tiến vào thành phố
    // Vùng 2 (1650 → WORLD_W): ending background – xe tăng 390 húc cổng Dinh Độc Lập
    const BG_SPLIT = 1650;
    if(G.imgs.bg1 && G.imgs.bg1.complete && G.imgs.bg1.naturalWidth){
      const iw=G.imgs.bg1.naturalWidth, ih=G.imgs.bg1.naturalHeight;
      ctx.drawImage(G.imgs.bg1, 0,0, iw,ih, 0, 30, BG_SPLIT, 390);
    } else {
      ctx.fillStyle='#2d7a18'; ctx.fillRect(0,30,BG_SPLIT,390);
    }
    if(G.imgs.bgEnd && G.imgs.bgEnd.complete && G.imgs.bgEnd.naturalWidth){
      const iw=G.imgs.bgEnd.naturalWidth, ih=G.imgs.bgEnd.naturalHeight;
      ctx.drawImage(G.imgs.bgEnd, 0,0, iw,ih, BG_SPLIT, 30, WORLD_W-BG_SPLIT, 390);
    } else {
      ctx.fillStyle='#1a3a10'; ctx.fillRect(BG_SPLIT,30,WORLD_W-BG_SPLIT,390);
    }

    // ② Dải đường chạy xuyên suốt thế giới
    // Nền tối dưới đường để tách khỏi bg
    ctx.fillStyle='rgba(0,0,0,.28)'; ctx.fillRect(0,410,WORLD_W,90);
    // Mặt đường nhựa
    ctx.fillStyle='#3e3e3e'; ctx.fillRect(0,422,WORLD_W,52);
    // Vạch kẻ đường
    ctx.setLineDash([28,22]); ctx.strokeStyle='rgba(255,255,180,.32)'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(0,448); ctx.lineTo(WORLD_W,448); ctx.stroke();
    ctx.setLineDash([]);
    // Lề đường
    ctx.fillStyle='#555'; ctx.fillRect(0,420,WORLD_W,4);
    ctx.fillStyle='#555'; ctx.fillRect(0,470,WORLD_W,4);
    // Dải tiền cảnh
    ctx.fillStyle='rgba(0,0,0,.45)'; ctx.fillRect(0,472,WORLD_W,30);

    // ③ (Dinh Độc Lập đã được thay bằng ảnh ending background – không cần tự vẽ nữa)

    // ④ Vật phẩm trên đường – xuất hiện ngay sau câu hỏi trước, nhân vật đi đến thì biến mất
    const ri=G.roadItem;
    if(ri.active && ri.item){
      const ix=ri.worldX, iy=400;
      const pulse=0.75+0.25*Math.sin(t*.007);
      const bounce=Math.sin(t*.005)*6;
      const sz=56;

      ctx.save();
      // Hào quang vàng phát sáng
      const grd=ctx.createRadialGradient(ix,iy+bounce,sz*0.3,ix,iy+bounce,sz*1.15);
      grd.addColorStop(0,`rgba(255,230,0,${0.75*pulse})`);
      grd.addColorStop(0.5,`rgba(255,180,0,${0.35*pulse})`);
      grd.addColorStop(1,'rgba(255,150,0,0)');
      ctx.fillStyle=grd;
      ctx.beginPath(); ctx.arc(ix,iy+bounce,sz*1.15,0,Math.PI*2); ctx.fill();

      // Ảnh vật phẩm thật
      const itemImg=G.itemImgCache[ri.item.name];
      if(itemImg && itemImg.complete && itemImg.naturalWidth){
        ctx.shadowColor='#f4d03f'; ctx.shadowBlur=22;
        ctx.drawImage(itemImg, ix-sz/2, iy+bounce-sz/2, sz, sz);
        ctx.shadowBlur=0;
      }

      // Tên vật phẩm bên dưới
      ctx.font=`bold 11px 'Rokkitt',serif`;
      ctx.textAlign='center'; ctx.textBaseline='top';
      ctx.fillStyle=`rgba(255,230,80,0.95)`;
      ctx.shadowColor='#000'; ctx.shadowBlur=5;
      ctx.fillText(ri.item.name, ix, iy+bounce+sz/2+4);
      ctx.shadowBlur=0;

      // Tia sáng xoay
      for(let s=0;s<8;s++){
        const sa=(s/8)*Math.PI*2+t*.003;
        const sr=sz*0.9+Math.sin(t*.007+s)*5;
        ctx.globalAlpha=0.6*pulse;
        ctx.fillStyle='#ffe040';
        ctx.fillRect(ix+Math.cos(sa)*sr-2, iy+bounce+Math.sin(sa)*sr*0.6-2, 4, 4);
      }
      ctx.globalAlpha=1;
      ctx.restore();
    }

    ctx.restore(); // ── kết thúc world layer ──

    // ── NHÂN VẬT / XE TĂNG (screen space) ───────────
    const heroScrX = j.worldX - cam;
    const heroY = 422;

    if(j.useTank){
      // ── Giai đoạn 3: Xe tăng 390 ──────────────────────
      // Crop vùng xe trong file 1024×1024 (rows 256-767, cols 5-1018)
      const TSX=5,TSY=256,TSW=1013,TSH=511;
      const th=100, tw=Math.round(TSW*(th/TSH)); // ~198×100px
      if(G.imgs.tank && G.imgs.tank.complete && G.imgs.tank.naturalWidth){
        if(j.walking){
          for(let d=0;d<4;d++){
            const da=((t*.0028+d*.32)%1);
            ctx.fillStyle=`rgba(165,145,105,${0.35*(1-da)})`;
            ctx.beginPath(); ctx.arc(heroScrX-tw/2-da*32, heroY-da*8, 2+da*10, 0,Math.PI*2); ctx.fill();
          }
        }
        // Flip ngang để xe tăng chạy đúng chiều (hướng phải)
        ctx.save();
        ctx.translate(heroScrX, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(G.imgs.tank, TSX,TSY,TSW,TSH, -tw/2, heroY-th, tw, th);
        ctx.restore();
      } else {
        drawJourneyTank(heroScrX, heroY, t, j.walking);
      }
    } else if(j.useSoldiers){
      // ── Giai đoạn 2: Đoàn quân tiến vào ──────────────
      // Crop vùng nội dung trong file 1920×1080 (rows 154-959, cols 318-1562)
      const SSX=318,SSY=154,SSW=1244,SSH=805;
      const sh=120, sw=Math.round(SSW*(sh/SSH)); // ~185×120px
      const bob = j.walking ? Math.sin(j.walkT*6)*1.8 : 0;
      if(G.imgs.soldiers && G.imgs.soldiers.complete && G.imgs.soldiers.naturalWidth){
        ctx.drawImage(G.imgs.soldiers, SSX,SSY,SSW,SSH, heroScrX-sw/2, heroY-sh+bob, sw, sh);
      }
    } else {
      // ── Giai đoạn 1: Nhân vật Linh ────────────────────
      const pose = j.walking ? 'walk' : 'flag';
      const bob = j.walking ? Math.sin(j.walkT*8)*2.8 : 0;
      if(G.imgs.char && G.imgs.char.complete && G.imgs.char.naturalWidth){
        const s=CHAR_SPRITES[pose];
        const h=130, w=Math.round(s.sw*(h/s.sh));
        ctx.drawImage(G.imgs.char, s.sx,s.sy,s.sw,s.sh, heroScrX-w/2, heroY-h+bob, w, h);
      }
    }

    // ── HUD ─────────────────────────────────────────
    P.rect(0,0,800,32,'rgba(0,0,0,.82)');
    const hprog=G.currentQ/QUESTIONS.length;
    P.rect(0,30, 800*hprog, 3, this.stageColor);
    P.rect(0,30, 800, 3, 'rgba(255,255,255,.06)');
    P.text('🗺️ Hành trình giải phóng', 12, 22, '#aaa', 12);
    P.text(`Câu ${Math.min(G.currentQ+1,QUESTIONS.length)} / ${QUESTIONS.length}`, 792, 22, '#f4d03f', 13, 'right');
    const cnt=G.inventory.length, tot=QUESTIONS.filter(q=>q.item).length;
    P.text(`🎁 ${cnt}/${tot}`, 400, 22, '#f4d03f', 13, 'center');

    // Tint nhẹ theo giai đoạn
    ctx.fillStyle=`${this.stageColor}12`; ctx.fillRect(0,0,800,500);
  },
};

// ═══════════════════════════════════════════════════════
//  SCENE: FINAL – Xe tăng húc cổng + Treo cờ
// ═══════════════════════════════════════════════════════
G.scenes.FINAL = {
  t:0, phase:0, tankX:0, gateAngle:0, confetti:[],

  // Vị trí cổng sắt trên canvas – khớp với hàng rào đáy ảnh dinh doc lap
  GX:288, GY:348, GW:224, GH:108,
  // Crop vùng nội dung trong file iron gates mới (2560×1440, gate lấp đầy toàn ảnh)
  GSX:0, GSY:0, GSW:2560, GSH:1440,

  _playCrash(){
    const ac = window._gameAC; if(!ac) return;
    if(ac.state==='suspended') ac.resume();
    try{
      const t = ac.currentTime;
      // Tiếng nổ thấp – boom
      const boom = ac.createOscillator(), bg = ac.createGain();
      boom.type='sine'; boom.frequency.setValueAtTime(90,t); boom.frequency.exponentialRampToValueAtTime(25,t+0.6);
      bg.gain.setValueAtTime(0.9,t); bg.gain.exponentialRampToValueAtTime(0.001,t+0.7);
      boom.connect(bg); bg.connect(ac.destination); boom.start(t); boom.stop(t+0.7);
      // Noise burst – tiếng sắt vỡ
      const nLen=Math.floor(ac.sampleRate*0.5);
      const nBuf=ac.createBuffer(1,nLen,ac.sampleRate);
      const nd=nBuf.getChannelData(0); for(let i=0;i<nLen;i++) nd[i]=(Math.random()*2-1)*Math.pow(1-i/nLen,1.2);
      const nSrc=ac.createBufferSource(); nSrc.buffer=nBuf;
      const lp=ac.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=1800;
      const ng=ac.createGain(); ng.gain.setValueAtTime(0.6,t); ng.gain.exponentialRampToValueAtTime(0.001,t+0.5);
      nSrc.connect(lp); lp.connect(ng); ng.connect(ac.destination); nSrc.start(t); nSrc.stop(t+0.5);
      // Tiếng kim loại va chạm – clang
      [350,520,780].forEach((freq,i)=>{
        const o=ac.createOscillator(), g=ac.createGain();
        o.type='triangle'; o.frequency.value=freq*(1+Math.random()*0.08);
        g.gain.setValueAtTime(0.25,t+i*0.03); g.gain.exponentialRampToValueAtTime(0.001,t+0.4+i*0.1);
        o.connect(g); g.connect(ac.destination); o.start(t+i*0.03); o.stop(t+0.5);
      });
    }catch(e){}
  },

  enter(){
    this.t=0; this.phase=0; this.tankX=-200; this.gateAngle=0;
    this._invShown=false; this._btnReg=false;
    document.getElementById('finalInventory').style.display='none';
    G.clearClicks();
    this.confetti=[];
    for(let i=0;i<150;i++) this.confetti.push({
      x:Math.random()*800, y:-Math.random()*500,
      vy:1.2+Math.random()*3, vx:(Math.random()-.5)*2.5,
      c:['#DA251D','#FFFF00','#27ae60','#fff','#f4d03f','#ff6b35'][i%6],
      sz:5+Math.random()*9, rot:Math.random()*Math.PI*2, rs:(Math.random()-.5)*.2,
    });
    setTimeout(()=>{this.phase=1}, 400);
    setTimeout(()=>{this.phase=2; this._playCrash();}, 3800); // tank đâm vào cổng
    setTimeout(()=>{this.phase=3}, 6000); // màn chiến thắng
    setTimeout(()=>G.fadeTo('CREDITS'), 14000); // auto credits
  },

  update(dt){
    this.t+=dt;
    for(const p of this.confetti){
      p.y+=p.vy; p.x+=p.vx; p.rot+=p.rs;
      if(p.y>520){p.y=-12; p.x=Math.random()*800}
    }
    // Tank tiến vào, dừng khi đã đâm vào cổng
    if(this.phase>=1 && this.tankX<310) this.tankX += dt*0.13;
    // Cổng đổ ra hai phía khi bị húc
    if(this.phase>=2 && this.gateAngle < Math.PI*0.55) this.gateAngle += dt*0.0022;
  },

  render(){
    const {GX,GY,GW,GH,GSX,GSY,GSW,GSH}=this;

    // ① Dinh Độc Lập làm nền – luôn vẽ full canvas
    let bgDrawn = false;
    if(G.imgs.dinhDocLap){ try{ ctx.drawImage(G.imgs.dinhDocLap,0,0,800,500); bgDrawn=true; }catch(e){} }
    if(!bgDrawn) P.grad(0,0,800,500,[[0,'#1a0a3a'],[0.5,'#2d1a5e'],[1,'#0a2a1a']]);

    // ② Cổng sắt với hiệu ứng đổ ra hai phía
    if(G.imgs.ironGate && G.imgs.ironGate.complete && G.imgs.ironGate.naturalWidth){
      const hw=GW/2; // nửa chiều rộng mỗi cánh
      const fall=Math.min(1, this.gateAngle/(Math.PI*0.55));

      // Cánh trái – đổ sang trái (xoay ngược chiều kim)
      ctx.save();
      ctx.translate(GX, GY+GH);           // pivot: góc dưới trái
      ctx.rotate(-this.gateAngle*0.85);
      ctx.globalAlpha = 1-fall*0.15;
      ctx.drawImage(G.imgs.ironGate, GSX, GSY, GSW/2, GSH, 0,-GH, hw, GH);
      ctx.restore();

      // Cánh phải – đổ sang phải (xoay thuận chiều kim)
      ctx.save();
      ctx.translate(GX+GW, GY+GH);        // pivot: góc dưới phải
      ctx.rotate(this.gateAngle*0.85);
      ctx.globalAlpha = 1-fall*0.15;
      ctx.drawImage(G.imgs.ironGate, GSX+GSW/2, GSY, GSW/2, GSH, -hw,-GH, hw, GH);
      ctx.restore();

      ctx.globalAlpha=1;
    }

    // ③ Bụi / nổ khi cổng đổ
    if(this.gateAngle>0.05){
      const imp=Math.min(1, this.gateAngle/0.8);
      const cx2=GX+GW/2, cy2=GY+GH;
      // Bụi đất lan rộng
      const dustGrd=ctx.createRadialGradient(cx2,cy2,0,cx2,cy2,90*imp);
      dustGrd.addColorStop(0,`rgba(200,150,80,${0.7*imp})`);
      dustGrd.addColorStop(1,'rgba(200,150,80,0)');
      ctx.fillStyle=dustGrd; ctx.beginPath(); ctx.arc(cx2,cy2,90*imp,0,Math.PI*2); ctx.fill();
      // Flash sáng khi va chạm ban đầu
      if(imp<0.4){
        const fi=1-imp/0.4;
        ctx.fillStyle=`rgba(255,220,80,${fi*0.55})`;
        ctx.beginPath(); ctx.arc(cx2,cy2-30,55*fi,0,Math.PI*2); ctx.fill();
      }
    }

    // ④ Xe tăng 390
    const TSX=5,TSY=256,TSW=1013,TSH=511;
    const fth=105, ftw=Math.round(TSW*(fth/TSH));
    const roadY=462; // hạ xuống để xe tăng đứng trên mặt cỏ
    if(this.phase>=1 && G.imgs.tank && G.imgs.tank.complete && G.imgs.tank.naturalWidth){
      ctx.drawImage(G.imgs.tank, TSX,TSY,TSW,TSH, this.tankX-ftw/2, roadY-fth, ftw, fth);
    }

    // ⑤ Nhân vật Linh giơ cờ (phase 2 trở đi, bên phải)
    if(this.phase>=2 && G.imgs.char && G.imgs.char.complete && G.imgs.char.naturalWidth){
      const s=CHAR_SPRITES.flag; const ch=140, cw=Math.round(s.sw*(ch/s.sh));
      ctx.drawImage(G.imgs.char,s.sx,s.sy,s.sw,s.sh, 620-cw/2, roadY-ch, cw, ch);
    }

    // ⑥ Confetti & pháo hoa (phase 2+)
    if(this.phase>=2){
      for(const p of this.confetti){
        ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
        ctx.fillStyle=p.c; ctx.fillRect(-p.sz/2,-p.sz/4,p.sz,p.sz/2);
        ctx.restore();

    // ⑦ Banner "Xe tăng 390 húc đổ cổng!" flash ngắn
    if(this.phase>=2 && this.t < 5500){
      const elapsed = this.t - (this.phase>=2 ? 0 : 9999);
      const al = Math.min(1,this.t/300) * (1-Math.max(0,(this.t-4500)/600));
      if(al>0){
        ctx.save(); ctx.globalAlpha=Math.max(0,al);
        ctx.fillStyle='rgba(180,20,20,.88)'; ctx.fillRect(140,195,520,46);
        ctx.strokeStyle='#f4d03f'; ctx.lineWidth=2; ctx.strokeRect(140,195,520,46);
        P.text('💥 XE TĂNG 390 HÚC ĐỔ CỔNG DINH ĐỘC LẬP!',400,225,'#FFFF00',14,'center');
        ctx.restore();
      }
    }

    // ⑧ Màn chiến thắng (phase 3)
    if(this.phase>=3){
      const ta=Math.min(1,(this.t-5800)/700);
      ctx.save(); ctx.globalAlpha=ta;
      ctx.fillStyle='rgba(0,0,0,.72)'; ctx.fillRect(70,130,660,240);
      ctx.strokeStyle='#f4d03f'; ctx.lineWidth=3; ctx.strokeRect(70,130,660,240);
      ctx.shadowColor='#f4d03f'; ctx.shadowBlur=22;
      P.text('🇻🇳  VIỆT NAM HOÀN TOÀN GIẢI PHÓNG!',400,172,'#FFFF00',18,'center');

      P.text('🏆 Xếp Hạng',B3x+Bw/2,By+30,bl?'#fff':'#2ecc71',13,'center');
      ctx.restore();
      if(!this._btnReg){ this._btnReg=true;
        G.addClick(B1x,By,Bw,Bh,()=>G.fadeTo('MENU'));
        G.addClick(B2x,By,Bw,Bh,()=>G.fadeTo('CREDITS'));
        G.addClick(B3x,By,Bw,Bh,()=>G.fadeTo('LEADERBOARD'));
      }
    }
    P.rect(0,0,240,28,'rgba(0,0,0,.65)');
    P.text('🏛️  Dinh Độc Lập – 30/4/1975',8,20,'#f4d03f',13);
  },
  drawFireworks(){
    [[120,100],[640,90],[250,60],[560,110],[380,80]].forEach(([fx,fy],i)=>{
      const off=(this.t*.002+i*1.3)%(Math.PI*2);
      for(let r=0;r<12;r++){
        const ang=(r/12)*Math.PI*2+off*.1,dist=38+20*Math.abs(Math.sin(off+r));
        ctx.fillStyle=['#DA251D','#FFFF00','#f4d03f','#fff','#27ae60'][r%5];
        ctx.globalAlpha=.4+.5*Math.abs(Math.sin(off+r*.3));
        ctx.fillRect(fx+Math.cos(ang)*dist,fy+Math.sin(ang)*dist,3,3);
      }
      ctx.globalAlpha=1;
    });
  },
};

    const medals=['🥇','🥈','🥉'];
    this.rows.slice(0,10).forEach((r,i)=>{
      const y=148+i*33;
      const isMe = r.name===G.playerInfo.name && r.position===G.playerInfo.position;

      const rank=i<3?medals[i]:String(i+1);

    ctx.strokeStyle='rgba(255,255,255,.08)'; ctx.lineWidth=1;

// ═══════════════════════════════════════════════════════
//  RESPONSIVE SCALE – giữ tỉ lệ 800×500 trên mọi màn hình
// ═══════════════════════════════════════════════════════
(function setupScale(){
  const wrapper = document.getElementById('gameWrapper');
  function scaleGame(){
    const vp = window.visualViewport;
    const vw = vp ? vp.width  : window.innerWidth;
    const vh = vp ? vp.height : window.innerHeight;
    const scale = Math.min(vw / 800, vh / 500);
    wrapper.style.transform = `translate(-50%,-50%) scale(${scale})`;
  }
  scaleGame();
  window.addEventListener('resize', scaleGame);
  window.addEventListener('orientationchange', ()=>{ setTimeout(scaleGame, 200); });
  if(window.visualViewport) window.visualViewport.addEventListener('resize', scaleGame);
})();

// ═══════════════════════════════════════════════════════
//  TOUCH SUPPORT – chuyển touch thành click cho mobile
// ═══════════════════════════════════════════════════════
(function setupTouch(){
  const wrapper = document.getElementById('gameWrapper');
  canvas.addEventListener('touchstart', e=>{
    e.preventDefault();
    const touch = e.touches[0];
    const rect  = canvas.getBoundingClientRect();
    // Tính lại tọa độ theo scale thực tế
    const scaleX = 800 / rect.width;
    const scaleY = 500 / rect.height;
    const x = (touch.clientX - rect.left) * scaleX;
    const y = (touch.clientY - rect.top)  * scaleY;
    // Fire synthetic click tại tọa độ canvas
    for(const c of G.clickables){
      if(x>=c.x&&x<=c.x+c.w&&y>=c.y&&y<=c.y+c.h){ c.fn(); return; }
    }
  }, {passive:false});

  // HTML overlays (nút quiz) đã dùng onclick nên không cần thêm
  // Nhưng cần prevent scroll khi chơi game
  document.body.addEventListener('touchmove', e=>e.preventDefault(), {passive:false});
})();

// ═══════════════════════════════════════════════════════
//  NHẠC NỀN – Proud VN.mp3 (phát từ MENU)
// ═══════════════════════════════════════════════════════
window._startMusic = (function(){
  let started = false;
  return function startMusic(){
    if(started) return; started = true;
    const ac = window._gameAC || new (window.AudioContext||window.webkitAudioContext)();
    window._gameAC = ac;
    if(ac.state==='suspended') ac.resume();
    fetch('Game sound/Proud VN.mp3')
      .then(r => r.arrayBuffer())
      .then(buf => ac.decodeAudioData(buf))
      .then(decoded => {
        const src = ac.createBufferSource();
        src.buffer = decoded;
        src.loop = true;
        const gain = ac.createGain();
        gain.gain.value = 0.55;
        src.connect(gain);
        gain.connect(ac.destination);
        src.start(0);
      })
      .catch(()=>{});
  };
})();
